<!DOCTYPE html>
<html>

<head>
  <title>Investor Club</title>
  <link rel="stylesheet" href="/static/main.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>

<body>
  {% include 'header.html' %}
  <div class="content">
    <h1>Analyysit</h1>
    {% for post in post_list %}
    <div class="post_homepage">
      <p>
        <h3><a href='/post/{{ post.id }}'>{{post.title}}</a></h3><a href='/profile/{{post.user_id}}'>{{post.username}}</a> | {{post.recommendation}} | {{post.likes}} tykkäystä | {{post.sent_at}} | {{post.market}} | {{post.industry}} | {{post.strategy}}
        <br />
      </p>
    </div>
    {% endfor %}
  </div>
</body>

</html>

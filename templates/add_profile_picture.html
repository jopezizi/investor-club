<!DOCTYPE html>
<html>
<head>
  <title>Profiilikuvan päivitys</title>
  <link rel="stylesheet" href="/static/main.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body>
  {% include 'header.html' %}

  {% if error %}
  <div style="color: red; border: 1px solid red; padding: 10px; margin: 10px 0; background-color: #ffe6e6;">
    <strong>VIRHE:</strong> {{ error }}
  </div>
  {% endif %}

  <form action="/add_profile_picture" method="post" enctype="multipart/form-data">
    <p>
      Kuva: <input type="file" name="image" accept=".jpg" />
    </p>
    <input type="submit" value="Lähetä" />
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  </form>
</body>
</html>

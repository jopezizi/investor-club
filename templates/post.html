<!DOCTYPE html>
<html>

<head>
  <title>Julkaisu</title>
  <link rel="stylesheet" href="/static/main.css">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>

<body>
  {% include 'header.html' %}
  <h1>{{ post.title }}</h1>
  julkaissut <b>{{ post.username }}</b> | {{ post.sent_at }}

  {%if post.user_id == session.user_id %}
  <p>
    <a href="/edit/{{ post.id }}">Muokkaa</a> |
    <a href="/remove/{{ post.id }}">Poista</a>
  </p>
  {% endif %}
    <hr>
  <p>
    {{ post.content }}
  </p>
</body>
</html>
